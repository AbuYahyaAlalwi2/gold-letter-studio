<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Gold Letter Studio | Professional Embroidery Engine</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --wilcom-dark: #1a1a1a; --wilcom-gray: #2d2d2d; --gold: #D4AF37; --blue-status: #007acc; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--wilcom-dark); color: #eee; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* شريط القوائم العلوي */
        .top-nav { height: 35px; background: #333; display: flex; align-items: center; padding: 0 10px; font-size: 12px; gap: 15px; border-bottom: 1px solid #444; }
        .logo-text { color: var(--gold); font-weight: bold; letter-spacing: 1px; margin-left: 15px; }

        /* شريط الأدوات القياسي (Standard Toolbar) */
        .standard-bar { height: 45px; background: var(--wilcom-gray); display: flex; align-items: center; padding: 0 10px; gap: 10px; border-bottom: 1px solid #111; }
        .btn-icon { padding: 8px; border-radius: 4px; cursor: pointer; color: #ccc; transition: 0.2s; }
        .btn-icon:hover { background: #444; color: var(--gold); }

        .main-container { display: flex; flex: 1; overflow: hidden; }

        /* صندوق الأدوات الجانبي (Toolbox) */
        .toolbox { width: 50px; background: var(--wilcom-gray); border-left: 1px solid #111; display: flex; flex-direction: column; align-items: center; py: 10px; gap: 8px; }
        .tool-active { background: var(--gold); color: #000; }

        /* منطقة التصميم (Work Area) */
        .work-area { flex: 1; background: #111; display: flex; align-items: center; justify-content: center; overflow: auto; position: relative; }
        #canvas-frame { background: white; box-shadow: 0 0 40px rgba(0,0,0,0.7); position: relative; }
        canvas { display: block; cursor: crosshair; touch-action: none; }

        /* لوحة الخصائص (Properties) */
        .side-panel { width: 230px; background: var(--wilcom-gray); border-right: 1px solid #111; display: flex; flex-direction: column; }
        .panel-header { background: #3c3c3c; padding: 8px 12px; font-size: 12px; font-weight: bold; color: var(--gold); border-bottom: 1px solid #222; }
        .panel-content { padding: 15px; font-size: 12px; }

        /* شريط الحالة (Status Bar) */
        footer { height: 28px; background: var(--blue-status); display: flex; align-items: center; padding: 0 12px; font-size: 11px; justify-content: space-between; }
    </style>
</head>
<body>

<nav class="top-nav">
    <div class="logo-text">GOLD LETTER STUDIO</div>
    <span>ملف</span><span>تعديل</span><span>عرض</span><span>غرزة</span><span>ترتيب</span><span>مساعدة</span>
</nav>

<div class="standard-bar">
    <i class="fas fa-file btn-icon"></i>
    <i class="fas fa-folder-open btn-icon"></i>
    <i class="fas fa-save btn-icon"></i>
    <div style="width:1px; height:20px; background:#555; margin:0 5px;"></div>
    <i class="fas fa-undo btn-icon"></i>
    <i class="fas fa-redo btn-icon"></i>
    <i class="fas fa-scissors btn-icon"></i>
    <i class="fas fa-search-plus btn-icon"></i>
</div>

<div class="main-container">
    <aside class="toolbox">
        <div class="btn-icon tool-active"><i class="fas fa-mouse-pointer"></i></div>
        <div class="btn-icon"><i class="fas fa-pen-nib"></i></div>
        <div class="btn-icon"><i class="fas fa-bezier-curve"></i></div>
        <div class="btn-icon"><i class="fas fa-font"></i></div>
        <div class="btn-icon"><i class="fas fa-shapes"></i></div>
    </aside>

    <main class="work-area">
        <div id="canvas-frame">
            <canvas id="embroideryCanvas" width="800" height="600"></canvas>
        </div>
    </main>

    <aside class="side-panel">
        <div class="panel-header">خصائص الكائن (Object)</div>
        <div class="panel-content">
            <label>نوع الغرزة:</label>
            <select style="width:100%; background:#444; color:white; border:none; padding:5px; margin:8px 0;">
                <option>Satin (ساتان)</option>
                <option>Tatami (تاتامي)</option>
                <option>Run (عداء)</option>
            </select>
            <label>الكثافة (Density):</label>
            <input type="range" style="width:100%; margin:10px 0;">
        </div>

        <div class="panel-header">قائمة الألوان</div>
        <div class="panel-content" style="display:grid; grid-template-columns: repeat(5, 1fr); gap:5px;">
            <div style="background:#D4AF37; height:20px; border:1px solid #555;"></div>
            <div style="background:#000; height:20px; border:1px solid #555;"></div>
            <div style="background:#fff; height:20px; border:1px solid #555;"></div>
            <div style="background:#f00; height:20px; border:1px solid #555;"></div>
            <div style="background:#00f; height:20px; border:1px solid #555;"></div>
        </div>
    </aside>
</div>

<footer>
    <div><i class="fas fa-check-circle"></i> جاهز</div>
    <div id="stats">X: 0.00 mm | Y: 0.00 mm | الغرز: 0</div>
</footer>

<script>
    const canvas = document.getElementById('embroideryCanvas');
    const ctx = canvas.getContext('2d');
    const stats = document.getElementById('stats');
    let drawing = false;

    // رسم الشبكة المليمتية
    function drawGrid() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = "#f0f0f0";
        ctx.lineWidth = 0.5;
        for(let i=0; i<canvas.width; i+=20) {
            ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
        }
        for(let i=0; i<canvas.height; i+=20) {
            ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
        }
    }

    // منطق الرسم التفاعلي
    canvas.addEventListener('mousedown', () => { drawing = true; ctx.beginPath(); });
    canvas.addEventListener('mouseup', () => drawing = false);
    canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        
        stats.innerText = `X: ${(x/10).toFixed(2)} mm | Y: ${(y/10).toFixed(2)} mm | الغرز: ${Math.floor(x/5)}`;

        if (!drawing) return;
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';
        ctx.strokeStyle = '#D4AF37'; // لون الذهب
        ctx.lineTo(x, y);
        ctx.stroke();
    });

    drawGrid();
</script>
</body>
</html>
