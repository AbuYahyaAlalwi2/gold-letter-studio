<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Gold Letter Studio | المحرك الاحترافي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-gold: #D4AF37; --bg-dark: #1e1e1e; --sidebar-bg: #2d2d2d; --text-gray: #b0b0b0; }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg-dark); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* الشريط العلوي - Menu Bar */
        header { height: 40px; background: #333; display: flex; align-items: center; padding: 0 15px; border-bottom: 1px solid #444; font-size: 13px; gap: 20px; }
        .logo-area { color: var(--primary-gold); font-weight: bold; border-left: 2px solid #555; padding-left: 15px; }

        /* منطقة العمل الرئيسية */
        .main-layout { display: flex; flex: 1; overflow: hidden; }

        /* شريط الأدوات الجانبي (مثل ويلكم) */
        .toolbox { width: 50px; background: var(--sidebar-bg); border-left: 1px solid #444; display: flex; flex-direction: column; align-items: center; padding-top: 10px; gap: 15px; }
        .tool-icon { width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-gray); border-radius: 4px; transition: 0.2s; }
        .tool-icon:hover, .tool-icon.active { background: var(--primary-gold); color: black; }

        /* مساحة التصميم */
        .canvas-container { flex: 1; background: #121212; display: flex; align-items: center; justify-content: center; position: relative; overflow: auto; }
        canvas { background: white; box-shadow: 0 0 20px rgba(0,0,0,0.5); }

        /* لوحة الخصائص اليمين */
        .properties-panel { width: 220px; background: var(--sidebar-bg); border-right: 1px solid #444; padding: 15px; display: flex; flex-direction: column; gap: 20px; }
        .prop-group { border-bottom: 1px solid #444; padding-bottom: 15px; }
        .prop-title { color: var(--primary-gold); font-size: 12px; font-weight: bold; margin-bottom: 10px; text-transform: uppercase; }

        /* شريط المعلومات السفلي */
        footer { height: 30px; background: #007acc; color: white; display: flex; align-items: center; padding: 0 15px; font-size: 12px; justify-content: space-between; }
    </style>
</head>
<body>

<header>
    <div class="logo-area">GOLD LETTER STUDIO</div>
    <div>ملف</div><div>عرض</div><div>غرزة</div><div>ترتيب</div><div>أدوات</div><div>مساعدة</div>
</header>

<div class="main-layout">
    <aside class="toolbox">
        <div class="tool-icon active" title="تحديد"><i class="fas fa-mouse-pointer"></i></div>
        <div class="tool-icon" title="إدخال A"><i class="fas fa-pen-fancy"></i></div>
        <div class="tool-icon" title="تعبئة معقدة"><i class="fas fa-fill-drip"></i></div>
        <div class="tool-icon" title="نص"><i class="fas fa-font"></i></div>
        <div class="tool-icon" title="رسم دائرة"><i class="far fa-circle"></i></div>
    </aside>

    <main class="canvas-container">
        <canvas id="designCanvas" width="700" height="500"></canvas>
    </main>

    <aside class="properties-panel">
        <div class="prop-group">
            <div class="prop-title">خصائص الكائن</div>
            <label style="font-size:11px; color:var(--text-gray)">نوع الغرزة</label>
            <select style="width:100%; margin-top:5px; background:#444; color:white; border:none; padding:5px;">
                <option>Satin (ساتان)</option>
                <option>Tatami (تاتامي)</option>
                <option>ZigZag (زجزاج)</option>
            </select>
        </div>
        <div class="prop-group">
            <div class="prop-title">الكثافة (Density)</div>
            <input type="range" style="width:100%">
        </div>
        <div class="prop-group">
            <div class="prop-title">قائمة الألوان</div>
            <div style="display:flex; gap:5px; flex-wrap:wrap;">
                <div style="width:20px; height:20px; background:#D4AF37;"></div>
                <div style="width:20px; height:20px; background:#000;"></div>
                <div style="width:20px; height:20px; background:#fff; border:1px solid #555;"></div>
                <div style="width:20px; height:20px; background:#f00;"></div>
            </div>
        </div>
    </aside>
</div>

<footer>
    <div>جاهز</div>
    <div>X: 0.00 mm | Y: 0.00 mm | الغرز: 0</div>
</footer>

<script>
    const canvas = document.getElementById('designCanvas');
    const ctx = canvas.getContext('2d');
    
    // رسم خلفية قماشية بسيطة
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // رسم شبكة خفيفة
    ctx.strokeStyle = '#f0f0f0';
    for(let i=0; i<canvas.width; i+=20) {
        ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke();
    }
    for(let i=0; i<canvas.height; i+=20) {
        ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke();
    }
</script>

</body>
</html>
