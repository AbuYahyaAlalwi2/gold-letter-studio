<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Gold Letter | Professional Embroidery Studio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --wilcom-gray: #2b2b2b; --wilcom-accent: #D4AF37; --canvas-bg: #e0e0e0; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* شريط الأدوات العلوي - مطابق لويلكم */
        .top-toolbar { height: 45px; background: #333; display: flex; align-items: center; padding: 0 10px; gap: 15px; border-bottom: 1px solid #444; }
        .logo { color: var(--wilcom-accent); font-weight: bold; font-size: 14px; margin-left: 20px; }
        .icon-btn { color: #ccc; cursor: pointer; font-size: 16px; padding: 5px; border-radius: 3px; }
        .icon-btn:hover { background: #444; color: var(--wilcom-accent); }

        .main-workspace { display: flex; flex: 1; overflow: hidden; }

        /* صندوق الأدوات الجانبي */
        .side-toolbox { width: 45px; background: var(--wilcom-gray); border-left: 1px solid #444; display: flex; flex-direction: column; align-items: center; padding: 10px 0; gap: 12px; }
        .tool-active { background: var(--wilcom-accent) !important; color: black !important; }

        /* منطقة التصميم */
        .canvas-area { flex: 1; background: #121212; display: flex; align-items: center; justify-content: center; overflow: auto; position: relative; }
        #embroideryCanvas { background: white; box-shadow: 0 0 30px rgba(0,0,0,0.8); cursor: crosshair; touch-action: none; }

        /* لوحة الخصائص اليمين */
        .inspector { width: 200px; background: var(--wilcom-gray); border-right: 1px solid #444; padding: 10px; font-size: 12px; }
        .inspector-title { color: var(--wilcom-accent); border-bottom: 1px solid #444; padding-bottom: 5px; margin-bottom: 10px; font-weight: bold; }

        /* شريط المعلومات */
        .status-bar { height: 25px; background: #007acc; font-size: 11px; display: flex; align-items: center; padding: 0 10px; justify-content: space-between; }
    </style>
</head>
<body>

<header class="top-toolbar">
    <div class="logo">GOLD LETTER STUDIO</div>
    <i class="fas fa-file icon-btn" title="جديد"></i>
    <i class="fas fa-save icon-btn" title="حفظ"></i>
    <i class="fas fa-undo icon-btn" title="تراجع"></i>
    <i class="fas fa-redo icon-btn" title="إعادة"></i>
    <i class="fas fa-search-plus icon-btn" title="تكبير"></i>
</header>

<div class="main-workspace">
    <aside class="side-toolbox">
        <div class="icon-btn tool-active" title="تحديد"><i class="fas fa-mouse-pointer"></i></div>
        <div class="icon-btn" title="إدخال غرزة"><i class="fas fa-pen-nib"></i></div>
        <div class="icon-btn" title="نص تطريز"><i class="fas fa-font"></i></div>
        <div class="icon-btn" title="أشكال هندسية"><i class="fas fa-shapes"></i></div>
    </aside>

    <main class="canvas-area">
        <canvas id="embroideryCanvas" width="800" height="600"></canvas>
    </main>

    <aside class="inspector">
        <div class="inspector-title">خصائص الغرزة</div>
        <p>نوع التعبئة: <b>Satin</b></p>
        <p>الطول: <b>4.0mm</b></p>
        <p>الكثافة: <b>0.40mm</b></p>
        <div class="inspector-title" style="margin-top:20px;">الألوان</div>
        <div style="display:flex; gap:5px;">
            <div style="width:20px; height:20px; background:gold; border-radius:2px;"></div>
            <div style="width:20px; height:20px; background:black; border-radius:2px;"></div>
            <div style="width:20px; height:20px; background:red; border-radius:2px;"></div>
        </div>
    </aside>
</div>

<footer class="status-bar">
    <div>الحالة: جاهز للرسم</div>
    <div id="coords">X: 0.00 mm | Y: 0.00 mm</div>
</footer>

<script>
    const canvas = document.getElementById('embroideryCanvas');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    // تهيئة القماش (Grid)
    function init() {
        ctx.fillStyle = "white";
        ctx.fillRect(0,0, canvas.width, canvas.height);
        ctx.strokeStyle = "#eee";
        for(let i=0; i<canvas.width; i+=20) {
            ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke();
        }
    }

    // منطق الرسم الأولي (محاكاة الغرزة)
    canvas.addEventListener('mousedown', () => drawing = true);
    canvas.addEventListener('mouseup', () => { drawing = false; ctx.beginPath(); });
    canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        document.getElementById('coords').innerText = `X: ${(x/10).toFixed(2)} mm | Y: ${(y/10).toFixed(2)} mm`;
        
        if(!drawing) return;
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';
        ctx.strokeStyle = '#D4AF37'; // لون الخيط الذهبي
        ctx.lineTo(x, y);
        ctx.stroke();
    });

    init();
</script>
</body>
</html>
