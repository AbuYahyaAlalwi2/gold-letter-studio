<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Gold Letter Studio | Professional Embroidery Engine</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --wilcom-dark: #1a1a1a; --wilcom-gray: #2d2d2d; --gold: #D4AF37; --blue-status: #007acc; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--wilcom-dark); color: #eee; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        .top-nav { height: 35px; background: #333; display: flex; align-items: center; padding: 0 10px; font-size: 12px; gap: 15px; border-bottom: 1px solid #444; }
        .logo-text { color: var(--gold); font-weight: bold; letter-spacing: 1px; margin-left: 15px; }

        .standard-bar { height: 45px; background: var(--wilcom-gray); display: flex; align-items: center; padding: 0 10px; gap: 10px; border-bottom: 1px solid #111; }
        .btn-icon { padding: 8px; border-radius: 4px; cursor: pointer; color: #ccc; transition: 0.2s; user-select: none; -webkit-user-select: none; }
        .btn-icon:hover { background: #444; color: var(--gold); }

        .main-container { display: flex; flex: 1; overflow: hidden; }

        .toolbox { width: 70px; background: var(--wilcom-gray); border-left: 1px solid #111; display: flex; flex-direction: column; align-items: center; padding: 10px 0; gap: 8px; overflow-y: auto; }
        .tool-btn { width: 50px; height: 50px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 4px; cursor: pointer; color: #ccc; transition: 0.2s; user-select: none; -webkit-user-select: none; border: 2px solid transparent; font-size: 11px; gap: 3px; padding: 4px; text-align: center; touch-action: manipulation; }
        .tool-btn:active { transform: scale(0.95); }
        .tool-btn.active { background: var(--gold); color: #000; border-color: #fff; }
        .tool-btn:not(.active):hover { background: #444; }
        .tool-btn i { font-size: 20px; }

        .work-area { flex: 1; background: #111; display: flex; align-items: center; justify-content: center; overflow: auto; position: relative; }

        #canvas-container { position: relative; background: white; box-shadow: 0 0 40px rgba(0,0,0,0.7); }

        #ruler-top { position: absolute; top: 0; left: 30px; right: 0; height: 30px; background: #f5f5f5; border-bottom: 2px solid #666; }
        #ruler-left { position: absolute; left: 0; top: 30px; bottom: 0; width: 30px; background: #f5f5f5; border-right: 2px solid #666; }

        canvas { display: block; cursor: crosshair; touch-action: none; }
        #mainCanvas { position: absolute; top: 30px; left: 30px; }

        .side-panel { width: 230px; background: var(--wilcom-gray); border-right: 1px solid #111; display: flex; flex-direction: column; overflow-y: auto; }
        .panel-header { background: #3c3c3c; padding: 10px 12px; font-size: 12px; font-weight: bold; color: var(--gold); border-bottom: 1px solid #222; }
        .panel-content { padding: 12px; font-size: 12px; }

        .control-group { margin-bottom: 14px; }
        .control-group label { display: block; margin-bottom: 6px; color: #ccc; font-weight: 500; }
        .control-group input, .control-group select { width: 100%; background: #444; color: white; border: 1px solid #555; padding: 6px; border-radius: 3px; font-size: 11px; }
        .control-group input[type="range"] { padding: 0; cursor: pointer; }
        .control-group input[type="color"] { cursor: pointer; height: 32px; }

        .color-picker { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
        .color-swatch { width: 100%; aspect-ratio: 1; border: 2px solid #555; border-radius: 3px; cursor: pointer; transition: 0.2s; }
        .color-swatch.active { border-color: #fff; box-shadow: 0 0 6px rgba(255,255,255,0.5); }
        .color-swatch:hover { border-color: #ccc; }

        .value-display { color: #999; font-size: 10px; margin-top: 4px; }

        footer { height: 28px; background: var(--blue-status); display: flex; align-items: center; padding: 0 12px; font-size: 11px; justify-content: space-between; }
    </style>
</head>
<body>

<nav class="top-nav">
    <div class="logo-text">GOLD LETTER STUDIO</div>
    <span>ملف</span><span>تعديل</span><span>عرض</span><span>غرزة</span><span>ترتيب</span><span>مساعدة</span>
</nav>

<div class="standard-bar">
    <i class="fas fa-file btn-icon"></i>
    <i class="fas fa-folder-open btn-icon"></i>
    <i class="fas fa-save btn-icon"></i>
    <div style="width:1px; height:20px; background:#555; margin:0 5px;"></div>
    <i class="fas fa-undo btn-icon"></i>
    <i class="fas fa-redo btn-icon"></i>
    <i class="fas fa-scissors btn-icon"></i>
    <i class="fas fa-search-plus btn-icon"></i>
</div>

<div class="main-container">
    <aside class="toolbox">
        <div class="tool-btn active" data-tool="select"><i class="fas fa-arrow-pointer"></i><span>Select</span></div>
        <div class="tool-btn" data-tool="satin"><i class="fas fa-paint-brush"></i><span>Satin</span></div>
        <div class="tool-btn" data-tool="running"><i class="fas fa-pen"></i><span>Run</span></div>
        <div class="tool-btn" data-tool="tatami"><i class="fas fa-square"></i><span>Fill</span></div>
    </aside>

    <main class="work-area">
        <div id="canvas-container">
            <canvas id="ruler-top"></canvas>
            <canvas id="ruler-left"></canvas>
            <canvas id="mainCanvas" width="800" height="600"></canvas>
        </div>
    </main>

    <aside class="side-panel">
        <div class="panel-header">Stitch Settings</div>
        <div class="panel-content">
            <div class="control-group">
                <label for="stitch-spacing">Spacing (mm)</label>
                <input type="range" id="stitch-spacing" min="0.1" max="2" step="0.1" value="0.4">
                <div class="value-display"><span id="spacing-value">0.4</span> mm</div>
            </div>

            <div class="control-group">
                <label for="thread-color">Thread Color</label>
                <input type="color" id="thread-color" value="#D4AF37">
            </div>

            <div class="control-group">
                <label>Quick Colors</label>
                <div class="color-picker">
                    <div class="color-swatch active" style="background:#D4AF37;" data-color="#D4AF37" title="Gold"></div>
                    <div class="color-swatch" style="background:#000;" data-color="#000" title="Black"></div>
                    <div class="color-swatch" style="background:#fff;" data-color="#fff" title="White"></div>
                    <div class="color-swatch" style="background:#e74c3c;" data-color="#e74c3c" title="Red"></div>
                    <div class="color-swatch" style="background:#3498db;" data-color="#3498db" title="Blue"></div>
                    <div class="color-swatch" style="background:#2ecc71;" data-color="#2ecc71" title="Green"></div>
                    <div class="color-swatch" style="background:#f39c12;" data-color="#f39c12" title="Orange"></div>
                    <div class="color-swatch" style="background:#9b59b6;" data-color="#9b59b6" title="Purple"></div>
                    <div class="color-swatch" style="background:#e91e63;" data-color="#e91e63" title="Pink"></div>
                    <div class="color-swatch" style="background:#1abc9c;" data-color="#1abc9c" title="Teal"></div>
                </div>
            </div>
        </div>

        <div class="panel-header">Satin Options</div>
        <div class="panel-content">
            <div class="control-group">
                <label for="satin-width">Width (mm)</label>
                <input type="range" id="satin-width" min="0.5" max="10" step="0.5" value="3">
                <div class="value-display"><span id="width-value">3</span> mm</div>
            </div>

            <div class="control-group">
                <label for="satin-angle">Angle (°)</label>
                <input type="range" id="satin-angle" min="0" max="180" step="5" value="45">
                <div class="value-display"><span id="angle-value">45</span>°</div>
            </div>
        </div>

        <div class="panel-header">Fill Options</div>
        <div class="panel-content">
            <div class="control-group">
                <label for="fill-rows">Row Spacing (mm)</label>
                <input type="range" id="fill-rows" min="0.3" max="3" step="0.1" value="0.8">
                <div class="value-display"><span id="rows-value">0.8</span> mm</div>
            </div>

            <div class="control-group">
                <label for="fill-angle">Fill Angle (°)</label>
                <input type="range" id="fill-angle" min="0" max="180" step="5" value="45">
                <div class="value-display"><span id="fill-angle-value">45</span>°</div>
            </div>
        </div>
    </aside>
</div>

<footer>
    <div><i class="fas fa-check-circle"></i> جاهز</div>
    <div id="stats">X: 0.00 mm | Y: 0.00 mm | الغرز: 0</div>
</footer>

<script>
    const mainCanvas = document.getElementById('mainCanvas');
    const ctx = mainCanvas.getContext('2d');
    const rulerTop = document.getElementById('ruler-top');
    const rulerLeft = document.getElementById('ruler-left');
    const stats = document.getElementById('stats');

    const PIXELS_PER_MM = 3.7795275591;
    const GRID_SIZE_MM = 10;

    let drawing = false;
    let currentPath = [];
    let stitchCount = 0;
    let activeTool = 'select';
    let threadColor = '#D4AF37';
    let stitchSpacing = 0.4;
    let satinWidth = 3;
    let satinAngle = 45;
    let fillRowSpacing = 0.8;
    let fillAngle = 45;

    const state = {
        tool: 'select',
        color: '#D4AF37',
        spacing: 0.4,
        satinWidth: 3,
        satinAngle: 45,
        fillRows: 0.8,
        fillAngle: 45
    };

    function initializeCanvas() {
        const container = document.getElementById('canvas-container');
        const canvasWidth = mainCanvas.width;
        const canvasHeight = mainCanvas.height;

        container.style.width = (canvasWidth + 30) + 'px';
        container.style.height = (canvasHeight + 30) + 'px';

        rulerTop.width = canvasWidth;
        rulerTop.height = 30;
        rulerLeft.width = 30;
        rulerLeft.height = canvasHeight;

        drawRulers();
        drawGrid();
    }

    function drawRulers() {
        const topCtx = rulerTop.getContext('2d');
        const leftCtx = rulerLeft.getContext('2d');

        topCtx.fillStyle = '#f5f5f5';
        topCtx.fillRect(0, 0, rulerTop.width, rulerTop.height);
        leftCtx.fillStyle = '#f5f5f5';
        leftCtx.fillRect(0, 0, rulerLeft.width, rulerLeft.height);

        topCtx.strokeStyle = '#333';
        topCtx.fillStyle = '#333';
        topCtx.font = '9px Arial';
        topCtx.textAlign = 'center';

        for(let mm = 0; mm <= mainCanvas.width / PIXELS_PER_MM; mm += 10) {
            const px = mm * PIXELS_PER_MM;
            topCtx.beginPath();
            topCtx.moveTo(px, 20);
            topCtx.lineTo(px, 30);
            topCtx.stroke();
            topCtx.fillText(mm, px, 15);

            for(let sub = 1; sub < 10; sub++) {
                const subPx = (mm + sub) * PIXELS_PER_MM;
                if(subPx > mainCanvas.width) break;
                topCtx.beginPath();
                topCtx.moveTo(subPx, sub % 5 === 0 ? 22 : 25);
                topCtx.lineTo(subPx, 30);
                topCtx.stroke();
            }
        }

        leftCtx.strokeStyle = '#333';
        leftCtx.fillStyle = '#333';
        leftCtx.font = '9px Arial';
        leftCtx.textAlign = 'center';

        for(let mm = 0; mm <= mainCanvas.height / PIXELS_PER_MM; mm += 10) {
            const px = mm * PIXELS_PER_MM;
            leftCtx.beginPath();
            leftCtx.moveTo(20, px);
            leftCtx.lineTo(30, px);
            leftCtx.stroke();

            leftCtx.save();
            leftCtx.translate(10, px);
            leftCtx.rotate(-Math.PI / 2);
            leftCtx.fillText(mm, 0, 0);
            leftCtx.restore();

            for(let sub = 1; sub < 10; sub++) {
                const subPx = (mm + sub) * PIXELS_PER_MM;
                if(subPx > mainCanvas.height) break;
                leftCtx.beginPath();
                leftCtx.moveTo(sub % 5 === 0 ? 22 : 25, subPx);
                leftCtx.lineTo(30, subPx);
                leftCtx.stroke();
            }
        }
    }

    function drawGrid() {
        ctx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
        ctx.strokeStyle = "#e0e0e0";
        ctx.lineWidth = 0.5;

        const gridPx = GRID_SIZE_MM * PIXELS_PER_MM;

        for(let i = 0; i <= mainCanvas.width; i += gridPx) {
            ctx.beginPath();
            ctx.moveTo(i, 0);
            ctx.lineTo(i, mainCanvas.height);
            ctx.stroke();
        }

        for(let i = 0; i <= mainCanvas.height; i += gridPx) {
            ctx.beginPath();
            ctx.moveTo(0, i);
            ctx.lineTo(mainCanvas.width, i);
            ctx.stroke();
        }

        ctx.strokeStyle = "#c0c0c0";
        ctx.lineWidth = 1;
        const subGrid = gridPx / 2;
        for(let i = subGrid; i <= mainCanvas.width; i += gridPx) {
            ctx.beginPath();
            ctx.moveTo(i, 0);
            ctx.lineTo(i, mainCanvas.height);
            ctx.stroke();
        }
        for(let i = subGrid; i <= mainCanvas.height; i += gridPx) {
            ctx.beginPath();
            ctx.moveTo(0, i);
            ctx.lineTo(mainCanvas.width, i);
            ctx.stroke();
        }
    }

    function drawRunningStitch(fromX, fromY, toX, toY, color) {
        const distance = Math.sqrt(Math.pow(toX - fromX, 2) + Math.pow(toY - fromY, 2));
        const stitches = Math.max(Math.floor(distance / (state.spacing * PIXELS_PER_MM)), 1);
        const stitchLen = distance / stitches;

        ctx.shadowColor = 'rgba(0,0,0,0.2)';
        ctx.shadowBlur = 0.5;
        ctx.shadowOffsetX = 0.3;
        ctx.shadowOffsetY = 0.3;

        ctx.strokeStyle = color;
        ctx.lineWidth = 1.2;
        ctx.lineCap = 'round';

        for(let i = 0; i < stitches; i++) {
            const t = i / stitches;
            const t2 = (i + 0.5) / stitches;
            const x1 = fromX + (toX - fromX) * t;
            const y1 = fromY + (toY - fromY) * t;
            const x2 = fromX + (toX - fromX) * t2;
            const y2 = fromY + (toY - fromY) * t2;

            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();
        }

        ctx.shadowColor = 'transparent';
        return stitches;
    }

    function drawSatinStitch(fromX, fromY, toX, toY, color) {
        const distance = Math.sqrt(Math.pow(toX - fromX, 2) + Math.pow(toY - fromY, 2));
        const stitches = Math.max(Math.floor(distance / (state.spacing * PIXELS_PER_MM)), 1);

        ctx.shadowColor = 'rgba(0,0,0,0.3)';
        ctx.shadowBlur = 1;
        ctx.shadowOffsetX = 0.5;
        ctx.shadowOffsetY = 0.5;

        const lineAngle = Math.atan2(toY - fromY, toX - fromX);
        const perpAngle = lineAngle + Math.PI / 2;
        const widthPx = state.satinWidth * PIXELS_PER_MM / 2;

        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        for(let i = 0; i <= stitches; i++) {
            const t = i / stitches;
            const x = fromX + (toX - fromX) * t;
            const y = fromY + (toY - fromY) * t;

            const offset = Math.sin(i * Math.PI / 4) * 0.4;
            const x1 = x + Math.cos(perpAngle) * (widthPx + offset);
            const y1 = y + Math.sin(perpAngle) * (widthPx + offset);
            const x2 = x - Math.cos(perpAngle) * (widthPx + offset);
            const y2 = y - Math.sin(perpAngle) * (widthPx + offset);

            if(i > 0) {
                ctx.beginPath();
                ctx.moveTo(prevX1, prevY1);
                ctx.lineTo(x1, y1);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(prevX2, prevY2);
                ctx.lineTo(x2, y2);
                ctx.stroke();
            }

            var prevX1 = x1;
            var prevY1 = y1;
            var prevX2 = x2;
            var prevY2 = y2;
        }

        ctx.shadowColor = 'transparent';
        return stitches;
    }

    function drawTatamiFill(fromX, fromY, toX, toY, color) {
        const distance = Math.sqrt(Math.pow(toX - fromX, 2) + Math.pow(toY - fromY, 2));
        const rows = Math.max(Math.floor(distance / (state.fillRows * PIXELS_PER_MM)), 1);

        ctx.shadowColor = 'rgba(0,0,0,0.25)';
        ctx.shadowBlur = 0.8;
        ctx.shadowOffsetX = 0.3;
        ctx.shadowOffsetY = 0.3;

        ctx.strokeStyle = color;
        ctx.lineWidth = 1.5;
        ctx.lineCap = 'round';

        const lineAngle = Math.atan2(toY - fromY, toX - fromX);
        const perpAngle = lineAngle + Math.PI / 2;
        const rowSpacePx = state.fillRows * PIXELS_PER_MM;

        for(let row = 0; row < rows; row++) {
            const offset = (row - rows / 2) * rowSpacePx;
            const startX = fromX + Math.cos(perpAngle) * offset;
            const startY = fromY + Math.sin(perpAngle) * offset;
            const endX = toX + Math.cos(perpAngle) * offset;
            const endY = toY + Math.sin(perpAngle) * offset;

            ctx.beginPath();
            ctx.moveTo(startX, startY);
            ctx.lineTo(endX, endY);
            ctx.stroke();
        }

        ctx.shadowColor = 'transparent';
        return rows * 10;
    }

    function drawStitchedLine(fromX, fromY, toX, toY) {
        switch(state.tool) {
            case 'running':
                return drawRunningStitch(fromX, fromY, toX, toY, state.color);
            case 'satin':
                return drawSatinStitch(fromX, fromY, toX, toY, state.color);
            case 'tatami':
                return drawTatamiFill(fromX, fromY, toX, toY, state.color);
            default:
                return 0;
        }
    }

    function startDrawing(e) {
        if(state.tool === 'select') return;
        drawing = true;
        const rect = mainCanvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        currentPath = [{x, y}];
    }

    function stopDrawing() {
        drawing = false;
        currentPath = [];
    }

    function handleMouseMove(e) {
        const rect = mainCanvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        const mmX = (x / PIXELS_PER_MM).toFixed(2);
        const mmY = (y / PIXELS_PER_MM).toFixed(2);

        stats.innerText = `X: ${mmX} mm | Y: ${mmY} mm | Stitches: ${stitchCount}`;

        if(!drawing) return;

        if(currentPath.length > 0) {
            const lastPoint = currentPath[currentPath.length - 1];
            const newStitches = drawStitchedLine(lastPoint.x, lastPoint.y, x, y);
            stitchCount += newStitches;
            currentPath.push({x, y});
        }
    }

    mainCanvas.addEventListener('mousedown', startDrawing);
    mainCanvas.addEventListener('mouseup', stopDrawing);
    mainCanvas.addEventListener('mousemove', handleMouseMove);
    mainCanvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const touch = e.touches[0];
        const mouseEvent = new MouseEvent('mousedown', {
            clientX: touch.clientX,
            clientY: touch.clientY
        });
        mainCanvas.dispatchEvent(mouseEvent);
    });
    mainCanvas.addEventListener('touchend', (e) => {
        e.preventDefault();
        stopDrawing();
    });
    mainCanvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
        const touch = e.touches[0];
        const mouseEvent = new MouseEvent('mousemove', {
            clientX: touch.clientX,
            clientY: touch.clientY
        });
        mainCanvas.dispatchEvent(mouseEvent);
    });

    document.querySelectorAll('.tool-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            state.tool = btn.dataset.tool;
        });
    });

    document.getElementById('stitch-spacing').addEventListener('input', (e) => {
        state.spacing = parseFloat(e.target.value);
        document.getElementById('spacing-value').textContent = state.spacing.toFixed(1);
    });

    document.getElementById('thread-color').addEventListener('input', (e) => {
        state.color = e.target.value;
        document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
    });

    document.querySelectorAll('.color-swatch').forEach(swatch => {
        swatch.addEventListener('click', (e) => {
            const color = e.target.dataset.color;
            state.color = color;
            document.getElementById('thread-color').value = color;
            document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
            e.target.classList.add('active');
        });
    });

    document.getElementById('satin-width').addEventListener('input', (e) => {
        state.satinWidth = parseFloat(e.target.value);
        document.getElementById('width-value').textContent = state.satinWidth.toFixed(1);
    });

    document.getElementById('satin-angle').addEventListener('input', (e) => {
        state.satinAngle = parseFloat(e.target.value);
        document.getElementById('angle-value').textContent = state.satinAngle;
    });

    document.getElementById('fill-rows').addEventListener('input', (e) => {
        state.fillRows = parseFloat(e.target.value);
        document.getElementById('rows-value').textContent = state.fillRows.toFixed(1);
    });

    document.getElementById('fill-angle').addEventListener('input', (e) => {
        state.fillAngle = parseFloat(e.target.value);
        document.getElementById('fill-angle-value').textContent = state.fillAngle;
    });

    initializeCanvas();
</script>
</body>
</html>
